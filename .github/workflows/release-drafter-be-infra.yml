name: Release Drafter - BE/INFRA

on:
  push:
    branches:
      - "release/*"
    paths:
      - "backend/**"
      - "infra/**"
      - ".github/**"

jobs:
  update_release_draft:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: read

    steps:
      - name: Cleanup duplicate BE drafts
        run: |
            echo "Fetching BE draft releases..."

            RELEASES=$(curl -s \
            -H "Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}" \
            -H "Accept: application/vnd.github+json" \
            https://api.github.com/repos/${{ github.repository }}/releases)

            echo "====== RELEASE SUMMARY ======"
            echo "$RELEASES" | jq -r '.[] | "\(.id) | \(.name) | \(.tag_name) | draft=\(.draft)"'
            echo "============================="

            IDS=$(echo "$RELEASES" | jq -r '
                .[] | select(.draft == true and .tag_name == "release-be") | .id
            ')

            for ID in $IDS; do
                echo "Deleting existing BE draft ID: $ID"
                curl -s -X DELETE \
                -H "Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}" \
                -H "Accept: application/vnd.github+json" \
                https://api.github.com/repos/${{ github.repository }}/releases/$ID
            done

            
      - name: Run Release Drafter
        uses: release-drafter/release-drafter@v6
        with:
            config-name: release-drafter-be-infra.yml
            tag: release-be
        env:
            GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
