name: Release Drafter - BE/INFRA

on:
  push:
    branches:
      - "release/*"
    paths:
      - "backend/**"
      - "infra/**"
      - ".github/**"

jobs:
  update_release_draft:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: read

    steps:
      - name: Run Release Drafter
        uses: release-drafter/release-drafter@v6
        with:
            config-name: release-drafter-be-infra.yml
            tag: release-be
        env:
            GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}