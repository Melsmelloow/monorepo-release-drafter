name: Release Drafter - FE

on:
  push:
    branches:
      - "release/*"
    paths:
      - "frontend/**"

jobs:
  update_release_draft:
    runs-on: ubuntu-latest

    permissions:
      contents: write
      pull-requests: read

    steps:
      - name: Run Release Drafter
        uses: release-drafter/release-drafter@v6
        with:
            config-name: release-drafter-fe.yml
            tag: release-fe
        env:
            GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Cleanup duplicate FE drafts
        run: |
            echo "Fetching FE draft releases..."

            RELEASES=$(curl -s \
            -H "Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}" \
            -H "Accept: application/vnd.github+json" \
            https://api.github.com/repos/${{ github.repository }}/releases)

            echo "====== RELEASE SUMMARY ======"
            echo "$RELEASES" | jq -r '.[] | "\(.id) | \(.name) | \(.tag_name) | draft=\(.draft) | created=\(.created_at)"'
            echo "============================="

            OLD_IDS=$(echo "$RELEASES" | jq -r '
            [.[] | select(.draft == true and .tag_name == "release-fe")]
            | sort_by(.created_at)
            | reverse
            | .[1:]
            | .[].id
            ')

            echo "Old FE draft IDs:"
            echo "$OLD_IDS"

            for ID in $OLD_IDS; do
            echo "Deleting old FE draft release ID: $ID"
            curl -s -X DELETE \
                -H "Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}" \
                -H "Accept: application/vnd.github+json" \
                https://api.github.com/repos/${{ github.repository }}/releases/$ID
            done

            echo "Cleanup completed."