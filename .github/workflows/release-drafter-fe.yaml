name: Release Drafter - FE

on:
  push:
    branches:
      - "release/*"
    paths:
      - "frontend/**"

jobs:
  update_release_draft:
    runs-on: ubuntu-latest

    permissions:
      contents: write
      pull-requests: read

    steps:
      - name: Run Release Drafter
        uses: release-drafter/release-drafter@v6
        with:
            config-name: release-drafter-fe.yml
            tag: release-fe
        env:
            GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}